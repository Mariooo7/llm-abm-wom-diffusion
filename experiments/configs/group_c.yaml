# 实验配置文件 - 组 C (随机网络 + 强情感)

group: C
description: "随机网络 + 强情感口碑"

# 网络配置
network:
  type: "random"  # small_world | random
  n_nodes: 100  # 简化：从 200 减少到 100，符合 ABM 标准实践 (Gilbert, 2008; JASSS 2023)
  avg_degree: 6

# 口碑语义配置
wom:
  strength: "strong"  # strong | weak
  high_arousal_ratio: 0.6  # 0-1
  corpus_path: "data/wom/wom_corpus.csv"
  memory_limit: 5
  share_multiplier: 1.0

# Bass 模型参数
bass:
  innovation_coef: 0.003  # p
  imitation_coef: 0.20  # q

# 仿真配置
simulation:
  initial_seed_ratio: 0.04
  n_steps: 60  # 简化：从 100 减少到 60，扩散曲线通常在 50-60 步达到稳定
  n_repetitions: 15  # 简化：从 20 减少到 15，ABM 标准建议 (Gilbert, 2008)
  seed: 42
  use_llm: true
  llm_sampling_ratio: 1.0  # 100% 决策使用 LLM（保持研究设计）

# 输出配置
output:
  save_raw: true
  save_processed: true
  log_level: "INFO"
